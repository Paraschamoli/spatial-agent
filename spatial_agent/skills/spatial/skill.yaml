id: spatial-v1
name: spatial
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Comprehensive spatial transcriptomics analysis skill for cell type annotation, 
  cell-cell communication analysis, and spatial domain detection.

# Tags and Modes
tags:
  - spatial-transcriptomics
  - bioinformatics
  - cell-type-annotation
  - spatial-analysis
  - genomics

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "Annotate cell types in my spatial transcriptomics data from mouse brain"
  - "Perform cell-cell communication analysis on my tumor microenvironment data"
  - "Design a 50-gene panel for spatial analysis of human liver tissue"
  - "Identify spatial domains in my breast cancer dataset"

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Spatial transcriptomics data analysis with automated workflows"
    features:
      - "Cell type annotation using reference datasets"
      - "Cell-cell communication analysis"
      - "Spatial domain detection"
      - "Gene panel design"
      - "Literature and database integration"
    limitations: "Requires spatial coordinates and gene expression data"

  secondary_capability:
    supported: true
    description: "Multi-omics integration and trajectory analysis"
    features:
      - "RNA velocity analysis"
      - "Multimodal data integration"
      - "Trajectory inference"
      - "Spatial mapping of scRNA-seq data"

# Requirements
requirements:
  packages:
    - "scanpy>=1.10"
    - "anndata>=0.11"
    - "pandas>=2.2"
    - "numpy>=2.0"
    - "matplotlib>=3.9"
    - "biopython>=1.84"
    - "gget>=0.28.0"
  system:
    - "Python 3.11+"
  min_memory_mb: 1024

# Performance Metrics
performance:
  avg_processing_time_ms: 5000
  max_concurrent_requests: 5
  memory_per_request_mb: 1024
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

