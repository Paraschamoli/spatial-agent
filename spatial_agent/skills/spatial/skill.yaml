id: spatial-v1
name: spatial
version: 1.0.0
author: paras@getbindu.com

# Description
description: |
  Multi-agent system that generates spatial transcriptomics analysis plans.
  Coordinates three specialized LLM agents to provide guidance on cell type annotation,
  cell-cell communication analysis, and spatial domain detection strategies.

# Tags and Modes
tags:
  - spatial-transcriptomics
  - analysis-planning
  - bioinformatics
  - multi-agent

input_modes:
  - text/plain
  - application/json

output_modes:
  - text/plain
  - application/json

# Example Queries
examples:
  - "I have a spatial transcriptomics dataset from human breast cancer tissue. Provide an analysis plan for cell type annotation and communication analysis."
  - "Create a workflow for analyzing 10x Visium data with 5,000 spots to identify spatial domains and cell-cell interactions."
  - "Recommend tools and methods for spatial transcriptomics analysis of tumor microenvironment."

# Detailed Capabilities
capabilities_detail:
  primary_capability:
    supported: true
    description: "Generates analysis plans using three specialized LLM agents"
    features:
      - "Annotation Specialist: Recommends cell type annotation strategies"
      - "Communication Analyst: Suggests cell-cell communication analysis methods"
      - "Spatial Domain Expert: Provides spatial domain detection guidance"
      - "Multidisciplinary synthesis: Integrates specialist recommendations into cohesive workflow"
    limitations: "Provides guidance only, does not execute analysis or process actual data files"

  secondary_capability:
    supported: false
    description: "Data processing and execution capabilities not implemented"

# Requirements
requirements:
  packages:
    - "langchain-core"
    - "langchain-openai"
    - "pydantic"
    - "bindu"
  system:
    - "Python 3.11+"
  min_memory_mb: 256

# Performance Metrics
performance:
  avg_processing_time_ms: 20000
  max_concurrent_requests: 5
  memory_per_request_mb: 256
  scalability: horizontal

# Tool Restrictions
allowed_tools:
  - Read
  - Write
  - Execute

# Rich Documentation
documentation:
  overview: |
    Multi-agent team that coordinates spatial transcriptomics analysis planning.
    Uses three specialized LLM agents running concurrently: Annotation Specialist,
    Communication Analyst, and Spatial Domain Expert. Each agent analyzes the user's
    data description and provides domain-specific recommendations. A fourth agent
    (MultidisciplinarySpatialTeam) synthesizes all specialist reports into a
    comprehensive, integrated analysis plan. Built on LangChain with OpenRouter models.

  use_cases:
    when_to_use:
      - "Planning spatial transcriptomics analysis workflows"
      - "Getting recommendations for tools and methods"
      - "Understanding best practices for cell type annotation, communication analysis, or spatial domain detection"
      - "Designing analysis strategies for 10x Visium or similar spatial data"

    when_not_to_use:
      - "Actual data processing or file manipulation"
      - "Running computational analysis pipelines"
      - "Real-time data visualization"
      - "Non-spatial transcriptomics analysis"

  input_structure: |
    JSON-RPC 2.0 message with user query describing spatial transcriptomics dataset.

    Example:
    {
      "jsonrpc": "2.0",
      "method": "message/send",
      "params": {
        "message": {
          "role": "user",
          "parts": [
            {
              "kind": "text",
              "text": "I have a spatial transcriptomics dataset from human breast cancer tissue analyzed with 10x Visium. The dataset contains approximately 5,000 spots. I need to identify cell types, analyze cell-cell communication, and detect spatial domains."
            }
          ],
          "kind": "message",
          "messageId": "9e83c510-5616-49ad-b187-d93cbb800001",
          "contextId": "9e83c510-5616-49ad-b187-d93cbb800002",
          "taskId": "9e83c510-5616-49ad-b187-d93cbb800003"
        },
        "skillId": "spatial-v1",
        "configuration": {
          "acceptedOutputModes": ["application/json"]
        }
      },
      "id": "9e83c510-5616-49ad-b187-d93cbb800003"
    }

  output_format: |
    JSON-RPC 2.0 result with task history and artifacts containing markdown analysis plan.

    Success Response:
    {
      "jsonrpc": "2.0",
      "id": "9e83c510-5616-49ad-b187-d93cbb800004",
      "result": {
        "id": "9e83c510-5616-49ad-b187-d93cbb800003",
        "context_id": "9e83c510-5616-49ad-b187-d93cbb800002",
        "kind": "task",
        "status": {
          "state": "completed",
          "timestamp": "2026-03-12T03:44:07.092657+00:00"
        },
        "history": [
          {
            "kind": "message",
            "role": "user",
            "parts": [{"kind": "text", "text": "User query"}]
          },
          {
            "kind": "message",
            "role": "assistant",
            "parts": [{"kind": "text", "text": "### Spatial Analysis Plan:\n\n[Integrated plan with steps for preprocessing, annotation, communication analysis, spatial domain detection, visualization, and interpretation]"}]
          }
        ],
        "artifacts": [
          {
            "name": "result",
            "parts": [{"kind": "text", "text": "Markdown formatted analysis plan"}]
          }
        ]
      }
    }

  error_handling:
    - "Missing API key: Returns error message requesting OPENROUTER_API_KEY"
    - "LLM API failures: Prints error and returns error message"
    - "Empty data description: Returns error requesting user input"
    - "Agent execution errors: Caught and returned as error strings"

  examples:
    - title: "Breast Cancer Spatial Analysis Planning"
      input:
        parts:
          - kind: "text"
            text: "I have a spatial transcriptomics dataset from human breast cancer tissue analyzed with 10x Visium. The dataset contains approximately 5,000 spots and 20,000 genes. I need to perform cell type annotation using PanglaoDB markers, analyze cell-cell communication using CellPhoneDB, and detect spatial domains."
      output:
        text: |
          ### Spatial Analysis Plan:

          Step 1: Preprocessing and Quality Control
          - Use Seurat or Scanpy for data quality assessment
          - Normalize using SCTransform or log1p normalization
          - Filter low-quality spots

          Step 2: Cell Type Annotation
          - Use PanglaoDB database for marker identification
          - Perform clustering with Louvain or Leiden algorithm
          - Annotate clusters based on marker expression

          Step 3: Cell-Cell Communication Analysis
          - Prepare input for CellPhoneDB
          - Identify ligand-receptor interactions
          - Focus on immune checkpoint pathways

          Step 4: Spatial Domain Detection
          - Use SpaGCN and UTAG for spatial clustering
          - Identify tumor microenvironment regions
          - Detect immune infiltration zones

          Step 5: Visualization
          - Generate spatial plots with Seurat or Scanpy
          - Visualize interaction networks
          - Create spatial distribution maps

          Step 6: Integration and Interpretation
          - Integrate results from all analyses
          - Contextualize findings in breast cancer biology

  best_practices:
    for_developers:
      - "Use async/await for all agent operations"
      - "Handle LLM API errors gracefully"
      - "Validate OPENROUTER_API_KEY before initialization"
      - "Use concurrent execution for specialist agents"

    for_orchestrators:
      - "Route spatial transcriptomics planning queries to this skill"
      - "Expect 15-30 second processing time per request"
      - "Chain with data processing skills for execution"
      - "Monitor OpenRouter API usage and rate limits"
      - "This skill provides guidance only, not data processing"

  installation: |
    Install via package manager.

    Required packages:
    pip install langchain-core langchain-openai pydantic bindu

    Environment variables:
    OPENROUTER_API_KEY=<your-key>
    MODEL_NAME=gpt-4o (optional, defaults to gpt-4o)

    Run:
    python -m spatial_agent

  versioning:
    - version: "1.0.0"
      date: "2026-03-12"
      changes: "Initial release with multi-agent analysis planning"
    - version: "1.1.0"
      status: "planned"
      changes: "Add data processing capabilities and file handling"

# Assessment fields for skill negotiation
assessment:
  keywords:
    - "spatial"
    - "transcriptomics"
    - "visium"
    - "cell type"
    - "annotation"
    - "communication"
    - "spatial domain"
    - "CellPhoneDB"
    - "PanglaoDB"

  specializations:
    - domain: "spatial-transcriptomics"
      confidence_boost: 0.3
    - domain: "bioinformatics-planning"
      confidence_boost: 0.2

  anti_patterns:
    - "Actual data file processing or analysis execution"
    - "Non-spatial transcriptomics data"
    - "Real-time visualization generation"
    - "Bulk RNA-seq or scRNA-seq without spatial component"

  complexity_indicators:
    simple:
      - "Recommend tools for spatial analysis"
      - "Explain cell type annotation methods"
    medium:
      - "Create analysis plan for 10x Visium dataset"
      - "Suggest workflow for communication analysis"
    complex:
      - "Comprehensive multi-step analysis plan with tool recommendations and parameters"
      - "Integrated workflow covering annotation, communication, and spatial domains"
